<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="IronShield">
  <!-- Social avatar / Open Graph fallback. 1:1, high-contrast so the
       crest reads even when flattened to a tiny profile pic on X /
       Discord / Telegram. No wordmark: social platforms crop the
       frame tight and text gets illegible — the crest alone is the
       recognizable unit (same pattern as Discord, Stripe, Coinbase). -->
  <defs>
    <radialGradient id="sa-bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%"  stop-color="#1a1733" />
      <stop offset="55%" stop-color="#0a0c1a" />
      <stop offset="100%" stop-color="#050714" />
    </radialGradient>
    <linearGradient id="sa-rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4b8ff" />
      <stop offset="55%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
    <linearGradient id="sa-helmet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f0f2ff" />
      <stop offset="100%" stop-color="#9aa1c8" />
    </linearGradient>
    <radialGradient id="sa-halo" cx="50%" cy="55%" r="42%">
      <stop offset="0%"  stop-color="#a855f7" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Full-bleed square (no rounding — platforms add their own mask) -->
  <rect width="512" height="512" fill="url(#sa-bg)" />
  <!-- Purple halo centered on the crest -->
  <circle cx="256" cy="280" r="180" fill="url(#sa-halo)" />

  <!-- Shield — same geometry as primary, scaled to ~78% of the frame -->
  <g transform="translate(256, 256) scale(6.2) translate(-32, -32)">
    <path
      d="M32 4 L54 10 C55.5 10.4 56.5 11.8 56.5 13.4 L56.5 32
         C56.5 44.3 48 54.3 32 60 C16 54.3 7.5 44.3 7.5 32
         L7.5 13.4 C7.5 11.8 8.5 10.4 10 10 Z"
      fill="#0b0e1c"
      stroke="url(#sa-rim)"
      stroke-width="1.7"
      stroke-linejoin="round"
    />
    <g transform="translate(32, 34)">
      <path d="M-8 -16 L-10 -22" stroke="#e6e8f5" stroke-width="1.4" stroke-linecap="round" />
      <path d="M 8 -16 L 10 -22" stroke="#e6e8f5" stroke-width="1.4" stroke-linecap="round" />
      <circle cx="-10" cy="-22" r="1.3" fill="#c4b8ff" />
      <circle cx="10"  cy="-22" r="1.3" fill="#c4b8ff" />
      <rect x="-14" y="-4" width="3" height="8" rx="1.2" fill="url(#sa-helmet)" />
      <rect x="11"  y="-4" width="3" height="8" rx="1.2" fill="url(#sa-helmet)" />
      <path
        d="M-11 -16 C-11 -20 -7 -22 0 -22 C 7 -22 11 -20 11 -16
           L 11 4 C 11 7 8 9 0 9 C -8 9 -11 7 -11 4 Z"
        fill="url(#sa-helmet)"
      />
      <g fill="#1a1d2e">
        <rect x="-9"   y="-12" width="2" height="6" rx="0.8" />
        <rect x="-5.5" y="-12" width="2" height="6" rx="0.8" />
        <rect x="-2"   y="-12" width="2" height="6" rx="0.8" />
        <rect x="1.5"  y="-12" width="2" height="6" rx="0.8" />
        <rect x="5"    y="-12" width="2" height="6" rx="0.8" />
      </g>
      <circle cx="-4.5" cy="-1" r="2.6" fill="#1a1d2e" />
      <circle cx="4.5"  cy="-1" r="2.6" fill="#1a1d2e" />
      <circle cx="-3.6" cy="-1.8" r="0.9" fill="#e6e8f5" />
      <circle cx="5.4"  cy="-1.8" r="0.9" fill="#e6e8f5" />
    </g>
  </g>
</svg>
