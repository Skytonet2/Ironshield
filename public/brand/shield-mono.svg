<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="IronShield">
  <!-- Monochrome variant: single-color fill + stroke, driven by the
       host's currentColor. Used in loading/splash states where we
       pulse-animate the glow, and anywhere a flat single-tone logo
       is needed (e.g. system notifications, low-color contexts). -->
  <path
    d="M32 4 L54 10 C55.5 10.4 56.5 11.8 56.5 13.4 L56.5 32
       C56.5 44.3 48 54.3 32 60 C16 54.3 7.5 44.3 7.5 32
       L7.5 13.4 C7.5 11.8 8.5 10.4 10 10 Z"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    stroke-linejoin="round"
  />
  <g transform="translate(32, 34)" fill="currentColor">
    <!-- Antennae -->
    <path d="M-8 -16 L-10 -22" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none" />
    <path d="M 8 -16 L 10 -22" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none" />
    <circle cx="-10" cy="-22" r="1.3" />
    <circle cx="10"  cy="-22" r="1.3" />

    <!-- Side caps + helmet outline -->
    <rect x="-14" y="-4" width="3" height="8" rx="1.2" />
    <rect x="11"  y="-4" width="3" height="8" rx="1.2" />

    <path
      d="M-11 -16 C-11 -20 -7 -22 0 -22 C 7 -22 11 -20 11 -16
         L 11 4 C 11 7 8 9 0 9 C -8 9 -11 7 -11 4 Z"
      fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"
    />

    <!-- Visor slits -->
    <rect x="-9"   y="-12" width="2" height="6" rx="0.8" />
    <rect x="-5.5" y="-12" width="2" height="6" rx="0.8" />
    <rect x="-2"   y="-12" width="2" height="6" rx="0.8" />
    <rect x="1.5"  y="-12" width="2" height="6" rx="0.8" />
    <rect x="5"    y="-12" width="2" height="6" rx="0.8" />

    <!-- Eyes -->
    <circle cx="-4.5" cy="-1" r="2.4" />
    <circle cx="4.5"  cy="-1" r="2.4" />
  </g>
</svg>
