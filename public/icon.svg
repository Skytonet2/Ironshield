<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="IronShield">
  <!-- Favicon. Same shield geometry as shield-mark.svg but tuned for a
       32×32 tab rasterization — slightly thicker stroke so the outline
       stays crisp when the browser shrinks this to 16×16. -->
  <defs>
    <linearGradient id="fv-rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
  </defs>
  <path
    d="M16 3 L26.5 5.9 C27.1 6.1 27.5 6.7 27.5 7.4 L27.5 16
       C27.5 22 23.5 27 16 29.4 C8.5 27 4.5 22 4.5 16
       L4.5 7.4 C4.5 6.7 4.9 6.1 5.5 5.9 Z"
    fill="#0b0e1c"
    stroke="url(#fv-rim)"
    stroke-width="1.8"
    stroke-linejoin="round"
  />
  <g transform="translate(16, 17)">
    <rect x="-5" y="-6" width="10" height="10" rx="2" fill="#e6e8f5" />
    <rect x="-3.5" y="-4.2" width="7" height="2.2" rx="0.8" fill="#1a1d2e" />
    <circle cx="-2.2" cy="1.2" r="1.2" fill="#1a1d2e" />
    <circle cx="2.2"  cy="1.2" r="1.2" fill="#1a1d2e" />
  </g>
</svg>
