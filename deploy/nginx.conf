# nginx.conf — Reverse proxy for IronClaw on ironclaw.com
# Handles HTTPS termination, serves static frontend, proxies API + webhook

server {
    listen 80;
    server_name ironclaw.com www.ironclaw.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ironclaw.com www.ironclaw.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Static frontend (Next.js export)
    root /usr/share/nginx/html;
    index index.html;

    # API proxy → backend
    location /api/ {
        proxy_pass http://ironclaw:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://ironclaw:3001/health;
    }

    # Telegram webhook endpoint
    location /bot {
        proxy_pass http://ironclaw:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
