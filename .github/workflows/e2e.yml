# .github/workflows/e2e.yml — Day 20 Playwright runner
#
# Runs the e2e/ smoke specs on every PR + push to main. Targets the
# live frontend by default (PLAYWRIGHT_BASE_URL is just the prod URL),
# which means CI is checking that the deploy is reachable — useful as
# a tripwire if Cloudflare or Render goes sideways.
#
# When a future PR adds the stubbed-wallet path (e2e/critical/*) the
# workflow needs a separate testnet step to fund the test wallet —
# don't bake that in until the wallet stub lands.

name: e2e

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  playwright:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke specs
        run: npx playwright test e2e/smoke
        env:
          # Default targets the live deploy. Override in a fork PR to
          # point at a preview URL by setting this in the PR's secrets.
          PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL || 'https://ironshield.pages.dev' }}
          PLAYWRIGHT_BACKEND_URL: ${{ vars.PLAYWRIGHT_BACKEND_URL || 'https://ironclaw-backend.onrender.com' }}

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
